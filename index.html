<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTalk | B2B Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f1115; color: #e2e8f0; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .metallic-text { background: linear-gradient(180deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        select option { background: #1a1d23; color: #fff; }
    </style>
</head>
<body class="antialiased">

    <div class="min-h-screen flex flex-col p-6 lg:p-12">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-2xl font-bold tracking-tighter metallic-text uppercase text-white">OMNITALK</h1>
            <div class="flex items-center gap-4">
                <span id="user-email" class="text-[10px] text-slate-500 uppercase tracking-widest hidden lg:block">Carregando...</span>
                <button onclick="logout()" class="px-4 py-2 glass rounded-xl text-[10px] uppercase tracking-widest hover:bg-white/5 transition-all">Sair</button>
            </div>
        </header>

        <main class="flex-1 flex flex-col items-center justify-center max-w-4xl mx-auto w-full">
            <div class="w-full glass p-8 lg:p-16 rounded-[3rem] border border-white/10 shadow-2xl text-center">
                <h2 class="text-4xl lg:text-6xl font-bold metallic-text mb-6 uppercase tracking-tighter">Configurar Reunião</h2>
                <p class="text-slate-400 mb-12 text-sm lg:text-base max-w-lg mx-auto">Selecione o nicho da conversa e o idioma alvo para ativar a tradução inteligente em tempo real.</p>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12 text-left">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-[0.2em] text-cyan-500 font-bold ml-4">Nicho da Chamada</label>
                        <select id="select-nicho" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:outline-none focus:border-cyan-500 transition-all appearance-none cursor-pointer">
                            <option value="Geral">Geral / Negócios</option>
                            <option value="Médico">Saúde / Médico</option>
                            <option value="Jurídico">Jurídico / Legal</option>
                            <option value="Tecnologia">TI / Tecnologia</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-[0.2em] text-cyan-500 font-bold ml-4">Idioma da Tradução</label>
                        <select id="select-idioma" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:outline-none focus:border-cyan-500 transition-all appearance-none cursor-pointer">
                            <option value="Português">Português (BR)</option>
                            <option value="Inglês">Inglês (US)</option>
                            <option value="Espanhol">Espanhol</option>
                        </select>
                    </div>
                </div>

                <button id="btn-iniciar" class="w-full py-6 bg-white text-black font-bold rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all text-xs uppercase tracking-[0.3em] shadow-xl shadow-white/5">
                    Iniciar Sala Agora
                </button>
            </div>
        </main>
    </div>

    <script>
        // Configuração Supabase (Suas chaves fornecidas)
        const supabaseUrl = 'https://dihkpsidfdaknvwhgypm.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpaGtwc2lkZmRha252d2hneXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTMwMDIsImV4cCI6MjA5MTY2OTAwMn0.O9QwNC7E50OcVwAapzVVPSJ6AelJD4fV1uGB0S_ZOuo';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Verificação de Autenticação
        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('user-email').innerText = session.user.email;
        }

        // Logout
        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        // Lógica de Início da Sala
        document.getElementById('btn-iniciar').onclick = async () => {
            const btn = document.getElementById('btn-iniciar');
            const nicho = document.getElementById('select-nicho').value;
            const idioma = document.getElementById('select-idioma').value;

            btn.disabled = true;
            btn.innerText = "ESTABELECENDO CONEXÃO...";

            try {
                const { data: { session } } = await _supabase.auth.getSession();
                
                // Chamamos sua Edge Function para validar a sessão
                const { data, error } = await _supabase.functions.invoke('start-session', {
                    body: { nicho, idioma },
                    headers: { Authorization: `Bearer ${session.access_token}` }
                });

                if (error) throw error;

                // Redireciona para room.html levando os parâmetros de tradução
                // Mesmo que a API não retorne uma URL, nós forçamos para a nossa página de sala
                window.location.href = `room.html?nicho=${encodeURIComponent(nicho)}&idioma=${encodeURIComponent(idioma)}`;

            } catch (err) {
                console.error(err);
                alert("Erro ao iniciar sala. Verifique sua conexão.");
                btn.disabled = false;
                btn.innerText = "Iniciar Sala Agora";
            }
        };

        window.onload = checkAuth;
    </script>
</body>
</html>
