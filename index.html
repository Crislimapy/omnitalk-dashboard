<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniTalk Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { background:#0f1115; color:#e2e8f0; }
.glass { background:rgba(255,255,255,0.03); backdrop-filter:blur(10px); }
</style>
</head>

<body class="p-6">

<h1 class="text-2xl mb-6">OMNITALK</h1>

<div class="glass p-6 rounded-2xl max-w-xl mx-auto">

<select id="nicho" class="w-full mb-4 p-3 bg-black/30">
<option value="Geral">Geral</option>
<option value="Médico">Médico</option>
<option value="Jurídico">Jurídico</option>
<option value="Tecnologia">Tecnologia</option>
</select>

<select id="idioma" class="w-full mb-4 p-3 bg-black/30">
<option value="Português">Português</option>
<option value="Inglês">Inglês</option>
<option value="Espanhol">Espanhol</option>
</select>

<button id="btn" class="w-full p-4 bg-white text-black rounded-xl">
Iniciar Sala
</button>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://dihkpsidfdaknvwhgypm.supabase.co",
  "SUA_PUBLIC_KEY_AQUI"
);

// 🔐 Verifica login
async function checkAuth(){
  const { data } = await supabase.auth.getSession();
  if(!data.session){
    alert("Faça login primeiro");
    return;
  }
}

// 🚀 Criar sala
document.getElementById("btn").onclick = async () => {

  const nicho = document.getElementById("nicho").value;
  const idioma = document.getElementById("idioma").value;

  const { data: sessionData } = await supabase.auth.getSession();

  const { data, error } = await supabase.functions.invoke("create-room", {
    body: { nicho, idioma },
    headers: {
      Authorization: `Bearer ${sessionData.session.access_token}`
    }
  });

  if(error){
    console.error(error);
    alert("Erro ao criar sala");
    return;
  }

  // 🔥 Redireciona com ID REAL
  window.location.href = `room.html?id=${data.room_id}`;
};

checkAuth();
</script>

</body>
</html>
