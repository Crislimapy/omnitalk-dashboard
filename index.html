<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTalk | B2B Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1115; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .metallic-text { background: linear-gradient(180deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="antialiased font-sans">
    <div class="min-h-screen flex flex-col p-6 lg:p-12">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-2xl font-bold tracking-tighter metallic-text uppercase">OmniTalk</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm text-slate-400">Cristian Lima</span>
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-slate-700 to-slate-900 border border-slate-600"></div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto w-full grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-2xl md:col-span-1">
                <p class="text-xs uppercase tracking-widest text-slate-500 mb-2">Créditos Disponíveis</p>
                <h2 id="saldo-display" class="text-4xl font-light text-white">-- <span class="text-lg text-slate-500 ml-1">min</span></h2>
            </div>

            <div class="glass p-6 rounded-2xl md:col-span-2">
                <h3 class="text-lg font-medium mb-4">Nova Reunião Inteligente</h3>
                <select id="select-nicho" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm outline-none text-slate-300">
                    <option>Carregando nichos...</option>
                </select>
                <button class="w-full mt-6 py-3 bg-white text-black font-bold rounded-xl hover:bg-cyan-400 transition-all uppercase text-sm tracking-widest">
                    Iniciar Sala Agora
                </button>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const supabaseUrl = 'https://iozbujgwbqcdecncytvq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvemJ1amd3YnFjZGVjbmN5dHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzg2OTEsImV4cCI6MjA5MDk1NDY5MX0.pqfkL-xA6XJNSK7TxE_3s3B8eTe6FFpEzAbFtb3UH8o';
        
        // Forma correta de inicializar no navegador
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            try {
                // Busca saldo na tabela 'perfis'
                const { data: perfis, error: pError } = await _supabase
                    .from('perfis')
                    .select('saldo_minuto')
                    .limit(1);

                if (perfis && perfis.length > 0) {
                    document.getElementById('saldo-display').innerHTML = `${perfis[0].saldo_minuto}<span class="text-lg text-slate-500 ml-1">min</span>`;
                }

                // Busca nichos na tabela 'ai_presets'
                const { data: presets } = await _supabase.from('ai_presets').select('nicho');
                if (presets) {
                    const select = document.getElementById('select-nicho');
                    select.innerHTML = presets.map(n => `<option>${n.nicho}</option>`).join('');
                }
            } catch (e) {
                console.error(e);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
