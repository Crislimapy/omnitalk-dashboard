<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniTalk Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background:#0f1115; color:#e2e8f0; }
    .glass { background:rgba(255,255,255,0.03); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); }
  </style>
</head>

<body class="p-6 min-h-screen flex flex-col">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-xl font-bold">OMNITALK</h1>

    <button onclick="logout()"
      class="px-4 py-2 bg-red-500 text-white rounded-lg text-sm">
      Sair
    </button>
  </div>

  <!-- CARD -->
  <div class="glass p-8 rounded-2xl max-w-md mx-auto w-full text-center">

    <select id="nicho" class="w-full mb-4 p-3 rounded-lg bg-black/30 border border-white/10">
      <option value="Geral">Geral / Negócios</option>
      <option value="Médico">Saúde / Médico</option>
      <option value="Jurídico">Jurídico / Legal</option>
      <option value="Tecnologia">TI / Tecnologia</option>
    </select>

    <select id="idioma" class="w-full mb-6 p-3 rounded-lg bg-black/30 border border-white/10">
      <option value="Português">Português (BR)</option>
      <option value="Inglês">Inglês (US)</option>
      <option value="Espanhol">Espanhol</option>
    </select>

    <button id="btnCriar"
      class="w-full py-4 bg-white text-black font-bold rounded-xl">
      Iniciar Sala
    </button>

    <p id="status" class="text-xs mt-4 text-gray-400"></p>

  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = window.supabase.createClient(
    "https://dihkpsidfdaknvwhgypm.supabase.co",
    "sb_publishable_TxahPXXnI_krxeCnyFDyBw_IP6GBE2N"
  );

  let currentSession = null;

  // 🔐 verifica sessão
  async function checkAuth() {
    const { data } = await sb.auth.getSession();

    if (!data.session) {
      window.location.href = "login.html";
      return;
    }

    currentSession = data.session;

    document.getElementById("status").innerText =
      "Logado: " + data.session.user.email;
  }

  // 🔄 escuta sessão (IMPORTANTE pro Google login)
  sb.auth.onAuthStateChange((event, session) => {
    if (session) {
      currentSession = session;
      console.log("Sessão ativa");
    }
  });

  // 🚀 criar sala
  document.getElementById("btnCriar").onclick = async () => {
    const status = document.getElementById("status");

    if (!currentSession) {
      status.innerText = "Sessão não encontrada...";
      return;
    }

    const nicho = document.getElementById("nicho").value;
    const idioma = document.getElementById("idioma").value;

    status.innerText = "Criando sala...";

    try {
      const { data, error } = await sb.functions.invoke("create-room", {
        body: { nicho, idioma },
        headers: {
          Authorization: `Bearer ${currentSession.access_token}`
        }
      });

      if (error) throw error;

      window.location.href = `room.html?id=${data.room_id}`;

    } catch (err) {
      console.error(err);
      status.innerText = "Erro ao criar sala.";
    }
  };

  // 🚪 logout
  async function logout() {
    await sb.auth.signOut();
    window.location.href = "login.html";
  }

  window.onload = checkAuth;
</script>

</body>
</html>
