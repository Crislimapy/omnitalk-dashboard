<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | OmniTalk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1115; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .metallic-text { background: linear-gradient(180deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass max-w-md w-full p-10 rounded-3xl text-center border border-white/10">
        <h1 class="text-3xl font-bold metallic-text mb-4 uppercase tracking-tighter">Acesso Restrito</h1>
        <p class="text-slate-400 text-sm leading-relaxed mb-8">
            O **OmniTalk** está atualmente em fase de convite exclusivo para executivos e especialistas.
        </p>
        <div class="py-4 px-6 bg-cyan-500/5 border border-cyan-500/20 rounded-xl mb-8">
            <p class="text-[10px] text-cyan-400 uppercase tracking-[0.2em]">Status do Sistema</p>
            <p class="text-xs text-white font-mono mt-1">Lista de Espera Ativa</p>
        </div>
        <a href="login.html" class="block w-full py-3 bg-white text-black font-bold rounded-xl hover:bg-slate-200 transition-all text-xs uppercase tracking-widest">
            Voltar ao Início
        </a>
        <p class="mt-6 text-[10px] text-slate-600 uppercase tracking-widest">
            Dúvidas? Entre em contato com o suporte B2B.
        </p>
    </div>
</body>
</html>
