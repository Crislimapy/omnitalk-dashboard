<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTalk | Access Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1115; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .metallic-text { background: linear-gradient(180deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-input:focus { border-color: rgba(0, 255, 255, 0.4); box-shadow: 0 0 10px rgba(0, 255, 255, 0.1); }
        input { background: #16191d !important; border: 1px solid #2d3748; }
    </style>
</head>
<body class="antialiased font-sans flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tighter metallic-text uppercase mb-2">OMNITALK</h1>
            <p class="text-slate-500 text-xs tracking-widest uppercase">Tradução B2B de Alta Fidelidade</p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl">
            <div id="auth-form">
                <div class="mb-6">
                    <label class="text-[10px] text-slate-500 uppercase tracking-widest block mb-2">E-mail Corporativo</label>
                    <input type="email" id="email" class="w-full rounded-xl p-3 text-sm outline-none neon-input text-white transition-all" placeholder="nome@empresa.com">
                </div>
                
                <div class="mb-8">
                    <label class="text-[10px] text-slate-500 uppercase tracking-widest block mb-2">Senha de Acesso</label>
                    <input type="password" id="password" class="w-full rounded-xl p-3 text-sm outline-none neon-input text-white transition-all" placeholder="••••••••">
                </div>

                <button id="btn-login" class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-cyan-400 transition-all uppercase text-xs tracking-[0.2em] mb-4">
                    Entrar na Plataforma
                </button>

                <button id="btn-signup" class="w-full py-3 border border-slate-700 text-slate-400 font-medium rounded-xl hover:border-slate-500 transition-all uppercase text-[10px] tracking-widest">
                    Criar Conta Nova
                </button>
            </div>
            
            <p id="msg" class="mt-6 text-center text-xs font-medium"></p>
        </div>

        <footer class="mt-12 text-center text-slate-600 text-[10px] tracking-[0.2em] uppercase">
            Sistema de Identidade Protegida | v1.2
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://iozbujgwbqcdecncytvq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvemJ1amd3YnFjZGVjbmN5dHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzg2OTEsImV4cCI6MjA5MDk1NDY5MX0.pqfkL-xA6XJNSK7TxE_3s3B8eTe6FFpEzAbFtb3UH8o';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const msg = document.getElementById('msg');

        // Lógica de Login
        document.getElementById('btn-login').onclick = async () => {
            msg.innerText = "Autenticando...";
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: emailInput.value,
                password: passInput.value,
            });

            if (error) {
                msg.classList.add('text-red-400');
                msg.innerText = "Erro: " + error.message;
            } else {
                msg.classList.replace('text-red-400', 'text-cyan-400');
                msg.innerText = "Acesso autorizado. Redirecionando...";
                setTimeout(() => window.location.href = 'index.html', 1500);
            }
        };

        // Lógica de Cadastro (Trigger vai dar os 30 min automaticamente no banco)
        document.getElementById('btn-signup').onclick = async () => {
            msg.innerText = "Criando sua conta B2B...";
            const { data, error } = await _supabase.auth.signUp({
                email: emailInput.value,
                password: passInput.value,
            });

            if (error) {
                msg.classList.add('text-red-400');
                msg.innerText = "Erro no cadastro: " + error.message;
            } else {
                msg.classList.replace('text-red-400', 'text-cyan-400');
                msg.innerText = "Conta criada! Verifique seu e-mail para ativar.";
            }
        };
    </script>
</body>
</html>
