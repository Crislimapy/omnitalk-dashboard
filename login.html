<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTalk | Access Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #e8e8ec; }
        .glass { background: rgba(24, 26, 32, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        @keyframes shimmer { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .shimmer-text {
            background: linear-gradient(135deg, #e8e8ec 0%, #b8b8c0 25%, #e8e8ec 50%, #8b8b96 75%, #e8e8ec 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 8s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden">
    
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-1/4 -left-20 w-96 h-96 bg-[#1a1b22] rounded-full blur-[120px] opacity-60"></div>
        <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-[#1a1b22] rounded-full blur-[120px] opacity-60"></div>
    </div>

    <div class="relative w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold tracking-[0.4em] shimmer-text">OMNITALK</h1>
            <p class="text-gray-500 text-sm mt-2 tracking-wide">Comunicação empresarial unificada</p>
        </div>

        <div class="glass rounded-2xl p-8 shadow-2xl">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-[#c0c0c8] text-sm font-medium mb-2">E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com" 
                        class="w-full h-12 px-4 bg-white/5 border border-white/10 rounded-lg focus:outline-none focus:border-[#b8b8c0] transition-all">
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-[#c0c0c8] text-sm font-medium">Senha</label>
                        <a href="#" class="text-xs text-gray-500 hover:text-white">Esqueceu a senha?</a>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full h-12 px-4 bg-white/5 border border-white/10 rounded-lg focus:outline-none focus:border-[#b8b8c0] transition-all">
                </div>

                <button type="submit" id="btnEntrar"
                    class="w-full h-12 bg-white text-[#0f1115] font-bold rounded-lg hover:bg-gray-200 transition-all flex items-center justify-center gap-2">
                    Entrar
                </button>

                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-white/10"></div>
                    <span class="flex-shrink mx-4 text-gray-500 text-xs">OU</span>
                    <div class="flex-grow border-t border-white/10"></div>
                </div>

                <button type="button" onclick="loginGoogle()"
                    class="w-full h-12 bg-white/5 border border-white/10 rounded-lg hover:bg-white/10 transition-all flex items-center justify-center gap-3">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                    Continuar com Google
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-white/5 text-center">
                <p class="text-sm text-gray-500">
                    Novo na plataforma? <a href="#" onclick="signUp()" class="text-white hover:underline">Criar conta</a>
                </p>
            </div>
            <p id="msg" class="mt-4 text-center text-sm hidden"></p>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE (Substitua pelas suas chaves se necessário)
        const SB_URL = "https://iozbujgwbqcdecncytvq.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvemJ1amd3YnFjZGVjbmN5dHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzg2OTEsImV4cCI6MjA5MDk1NDY5MX0.pqfkL-xA6XJNSK7TxE_3s3B8eTe6FFpEzAbFtb3UH8o";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // LOGIN E-MAIL/SENHA
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnEntrar');
            
            btn.innerText = "Verificando...";
            const { error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showMsg(error.message, "text-red-400");
                btn.innerText = "Entrar";
            } else {
                window.location.href = 'index.html';
            }
        };

        // LOGIN GOOGLE
        async function loginGoogle() {
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/index.html' }
            });
            if (error) showMsg(error.message, "text-red-400");
        }

        // CADASTRO (Lógica de 30 min integrada via Trigger no Banco)
        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return showMsg("Preencha e-mail e senha.", "text-yellow-400");

            const { error } = await _supabase.auth.signUp({ email, password });
            if (error) showMsg(error.message, "text-red-400");
            else showMsg("Verifique seu e-mail para confirmar!", "text-green-400");
        }

        function showMsg(text, colorClass) {
            const m = document.getElementById('msg');
            m.innerText = text;
            m.className = "mt-4 text-center text-sm " + colorClass;
            m.classList.remove('hidden');
        }
    </script>
</body>
</html>
