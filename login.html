<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniTalk | Login</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background:#0f1115; color:#e2e8f0; }
    .glass { background:rgba(255,255,255,0.03); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen">

  <div class="glass p-10 rounded-2xl text-center w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-6">OMNITALK</h1>

    <button onclick="loginGoogle()"
      class="w-full py-4 bg-white text-black rounded-xl font-bold">
      Entrar com Google
    </button>

    <p id="status" class="text-xs mt-4 text-gray-400"></p>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = window.supabase.createClient(
    "https://dihkpsidfdaknvwhgypm.supabase.co",
    "sb_publishable_TxahPXXnI_krxeCnyFDyBw_IP6GBE2N"
  );

  async function loginGoogle() {
    await sb.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: window.location.origin
      }
    });
  }

  // 🔥 se já estiver logado, pula pro dashboard
  window.onload = async () => {
    const { data } = await sb.auth.getSession();

    if (data.session) {
      window.location.href = "index.html";
    }
  };
</script>

</body>
</html>
